<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'">
<title>Мои карты</title>
<meta name="description" content="Премиальный учёт расходов и карт. Все данные хранятся только на устройстве.">
<meta name="theme-color" content="#0B0B0D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Карты">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<style>
/* ============ ТОКЕНЫ ============ */
:root{
  --bg0:#0B0B0D; --bg1:#121214;
  --panel:#17181C; --panel2:#1E1F24; --panel3:#26272D;
  --line:rgba(255,255,255,.065); --line2:rgba(255,255,255,.12);
  --text:#EDEDEF; --text2:#A0A2AB; --text3:#6E7078;
  --gold:#D4AF6A; --gold-hi:#E8C98A; --gold-lo:#B8934F;
  --red-hi:#C62839; --red-lo:#8E1B23;
  --green-hi:#1C5A43; --green-lo:#0F3D2E;
  --ok:#7FBF9E;
  --r-lg:22px; --r-md:16px; --r-sm:12px;
  --tabbar-h:64px;
  --spring:cubic-bezier(.34,1.28,.4,1);
  --spring-soft:cubic-bezier(.3,.9,.3,1);
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
  --display:"New York","New York Extra Large",ui-serif,Georgia,"Times New Roman",serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--sans); color:var(--text); background:var(--bg0);
  background:linear-gradient(180deg,#0B0B0D 0%,#121214 100%) fixed;
  overscroll-behavior:none; -webkit-font-smoothing:antialiased;
  touch-action:manipulation; user-select:none; -webkit-user-select:none;
}
input,textarea{user-select:text;-webkit-user-select:text}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
:focus{outline:none}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:8px}
.amt{font-variant-numeric:tabular-nums lining-nums;letter-spacing:.01em}
.sym{color:var(--gold);font-weight:600}

/* ============ КАРКАС ============ */
#app{position:fixed;inset:0;display:flex;flex-direction:column}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;
  padding:calc(env(safe-area-inset-top) + 8px) 0 calc(var(--tabbar-h) + env(safe-area-inset-bottom) + 24px);
  -webkit-overflow-scrolling:touch}
.page.on{display:block}
.wrap{max-width:720px;margin:0 auto;padding:0 18px}
.pagehead{display:flex;align-items:baseline;justify-content:space-between;margin:10px 0 14px}
.pagehead h1{font-family:var(--display);font-weight:600;font-size:30px;letter-spacing:.01em}

/* ============ ТАБ-БАР ============ */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;
  height:calc(var(--tabbar-h) + env(safe-area-inset-bottom));
  padding:6px 10px calc(env(safe-area-inset-bottom) + 4px);
  display:flex;justify-content:center;gap:4px;
  background:rgba(14,14,17,.82);-webkit-backdrop-filter:blur(22px);backdrop-filter:blur(22px);
  border-top:1px solid var(--line)}
.tab{flex:1;max-width:130px;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 4px;border-radius:14px;color:var(--text3);font-size:10.5px;font-weight:600;letter-spacing:.03em;
  transition:color .25s}
.tab svg{width:24px;height:24px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
.tab .ic-f{fill:currentColor}.tab .ic-s{stroke:currentColor}
.tab.on{color:var(--gold)}
.tab.on svg{filter:drop-shadow(0 0 8px rgba(212,175,106,.35)) drop-shadow(0 1px 2px rgba(0,0,0,.5))}

/* ============ КАРУСЕЛЬ КАРТ ============ */
.stage{perspective:1200px;perspective-origin:50% 45%;margin-top:4px}
.carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;
  scrollbar-width:none;-ms-overflow-style:none;
  padding:18px calc(50% - min(43vw,190px)) 26px}
.carousel::-webkit-scrollbar{display:none}
.slot{flex:0 0 min(86vw,380px);scroll-snap-align:center;padding:0 8px}
.card3d{transform-style:preserve-3d;transition:filter .3s;will-change:transform}
.bankcard{position:relative;aspect-ratio:1.586;perspective:1100px;cursor:pointer;border-radius:var(--r-lg)}
.bc-inner{position:absolute;inset:0;transform-style:preserve-3d;
  transition:transform .8s var(--spring)}
.bankcard.flipped .bc-inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:var(--r-lg);overflow:hidden;
  -webkit-backface-visibility:hidden;backface-visibility:hidden;
  box-shadow:0 18px 40px -12px rgba(0,0,0,.75),0 4px 12px rgba(0,0,0,.4),
    inset 0 1px 0 rgba(255,255,255,.14),inset 0 -1px 0 rgba(0,0,0,.35);
  padding:18px 20px;display:flex;flex-direction:column}
.face.back{transform:rotateY(180deg)}
/* дизайны карт */
.d-green .face{background:linear-gradient(128deg,#0F3D2E 0%,#155041 46%,#1C5A43 72%,#123F30 100%)}
.d-black .face{background:linear-gradient(128deg,#17181C 0%,#222329 45%,#2A2C31 70%,#1A1B1F 100%)}
.d-plat  .face{background:linear-gradient(128deg,#C9CDD3 0%,#AEB3BB 42%,#8E939C 75%,#B9BEC5 100%)}
.d-red   .face{background:linear-gradient(128deg,#8E1B23 0%,#A82230 48%,#C62839 72%,#961D27 100%)}
.d-plat .face{color:#25262B}
.d-plat .bc-sub{color:rgba(37,38,43,.62)}
.bc-sub{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:600}
.bc-name{font-family:var(--display);font-size:21px;font-weight:600;margin-top:2px}
.bc-row{display:flex;justify-content:space-between;align-items:flex-start}
.bc-bottom{margin-top:auto;display:flex;justify-content:space-between;align-items:flex-end}
.bc-bal{font-size:17px;font-weight:700}
.bc-logo{font-family:var(--display);font-style:italic;font-weight:600;font-size:14px;color:var(--gold);
  text-shadow:0 1px 2px rgba(0,0,0,.4)}
.d-plat .bc-logo{color:#8A6B33;text-shadow:0 1px 1px rgba(255,255,255,.35)}
.chip{width:40px;height:30px;border-radius:6px;margin:10px 0 0;
  background:linear-gradient(135deg,var(--gold-hi),var(--gold-lo));
  box-shadow:inset 0 1px 1px rgba(255,255,255,.55),inset 0 -1px 1px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.35);
  position:relative}
.chip::after{content:"";position:absolute;inset:5px 8px;border:1px solid rgba(80,55,10,.45);border-radius:3px}
/* сатиновый блик поверх лицевой стороны */
.face::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(120% 90% at 18% -10%,rgba(255,255,255,.16),transparent 55%),
    linear-gradient(105deg,transparent 38%,rgba(255,255,255,.07) 46%,rgba(255,255,255,.13) 50%,rgba(255,255,255,.05) 55%,transparent 64%)}
.d-plat .face::before{background:
    radial-gradient(120% 90% at 18% -10%,rgba(255,255,255,.5),transparent 55%),
    linear-gradient(105deg,transparent 38%,rgba(255,255,255,.28) 46%,rgba(255,255,255,.42) 50%,rgba(255,255,255,.2) 55%,transparent 64%)}
/* бегущий блик при перевороте */
.shine{position:absolute;inset:0;pointer-events:none;opacity:0;
  background:linear-gradient(100deg,transparent 30%,rgba(255,255,255,.28) 47%,rgba(255,255,255,.44) 50%,rgba(255,255,255,.28) 53%,transparent 70%);
  transform:translateX(-160%) skewX(-8deg)}
.bankcard.sweep .shine{animation:sweep .85s ease-out}
@keyframes sweep{0%{opacity:0;transform:translateX(-160%) skewX(-8deg)}
  25%{opacity:1}75%{opacity:1}
  100%{opacity:0;transform:translateX(160%) skewX(-8deg)}}
/* оборот карты */
.stripe{height:38px;margin:6px -20px 0;background:linear-gradient(180deg,rgba(0,0,0,.72),rgba(0,0,0,.6))}
.d-plat .stripe{background:linear-gradient(180deg,rgba(20,20,25,.85),rgba(20,20,25,.72))}
.back .bc-info{margin-top:14px;display:grid;gap:7px;font-size:12.5px}
.back .bc-info div{display:flex;justify-content:space-between}
.back .bc-info span:first-child{opacity:.6}
.dots{display:flex;justify-content:center;gap:7px;margin:-10px 0 6px}
.dots i{width:6px;height:6px;border-radius:50%;background:var(--text3);opacity:.45;transition:all .3s var(--spring-soft)}
.dots i.on{background:var(--gold);opacity:1;width:18px;border-radius:4px}

/* ============ ПАНЕЛЬ КАРТЫ ============ */
.hero{text-align:center;margin:14px 0 4px}
.hero-label{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--text2);font-weight:600}
.hero-amount{font-family:var(--display);font-weight:600;font-size:46px;letter-spacing:.01em;margin-top:4px;
  font-variant-numeric:tabular-nums lining-nums}
.hero-amount .frac{font-size:.55em;opacity:.55}
.hero-sub{color:var(--text2);font-size:13.5px;margin-top:6px}
.limitbar{height:6px;border-radius:3px;background:var(--panel2);margin:12px auto 0;max-width:320px;overflow:hidden;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.5)}
.limitbar i{display:block;height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--gold-lo),var(--gold-hi));
  box-shadow:0 0 8px rgba(212,175,106,.4);transition:width .6s var(--spring-soft)}
.limitbar.hot i{background:linear-gradient(90deg,var(--red-lo),var(--red-hi));box-shadow:0 0 8px rgba(198,40,57,.5)}
.actions{display:flex;justify-content:center;gap:14px;margin:20px 0 8px}
.act{display:flex;flex-direction:column;align-items:center;gap:8px;width:92px;padding:14px 6px 12px;
  border-radius:var(--r-md);background:linear-gradient(180deg,var(--panel2),var(--panel));
  border:1px solid var(--line);box-shadow:0 6px 16px -8px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05);
  font-size:12px;font-weight:600;color:var(--text);
  transition:transform .35s var(--spring),border-color .25s}
.act:active{transform:scale(.94)}
@media(hover:hover){.act:hover{border-color:rgba(212,175,106,.4);transform:translateY(-2px)}}
.act .aic{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;
  background:radial-gradient(circle at 32% 26%,var(--gold-hi),var(--gold-lo) 78%);
  box-shadow:0 4px 10px -2px rgba(212,175,106,.35),inset 0 1px 1px rgba(255,255,255,.55),inset 0 -2px 3px rgba(90,60,15,.45)}
.act .aic svg{width:19px;height:19px;stroke:#221A08;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;
  filter:drop-shadow(0 1px 0 rgba(255,255,255,.3))}

/* ============ СПИСКИ ОПЕРАЦИЙ ============ */
.section-t{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);font-weight:700;margin:22px 0 10px}
.daygroup{margin-bottom:6px}
.daylabel{font-size:12.5px;color:var(--text3);font-weight:600;margin:14px 2px 6px}
.oplist{background:linear-gradient(180deg,var(--panel),#141519);border:1px solid var(--line);
  border-radius:var(--r-md);overflow:hidden;box-shadow:0 8px 20px -12px rgba(0,0,0,.6)}
.op{display:flex;align-items:center;gap:12px;width:100%;padding:11px 14px;text-align:left;
  border-bottom:1px solid var(--line);transition:background .2s}
.op:last-child{border-bottom:none}
@media(hover:hover){.op:hover{background:rgba(255,255,255,.03)}}
.op:active{background:rgba(255,255,255,.05)}
.op .t{flex:1;min-width:0}
.op .t b{display:block;font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.op .t span{display:block;font-size:12px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.op .a{font-size:14.5px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.op .a.minus{color:var(--text)}
.op .a.plus{color:var(--ok)}
.op .a.move{color:var(--text2)}
.empty{padding:34px 20px;text-align:center;color:var(--text3);font-size:14px}

/* ============ ОБЪЁМНЫЕ ИКОНКИ ============ */
.cicon{width:38px;height:38px;flex:0 0 38px;filter:drop-shadow(0 3px 4px rgba(0,0,0,.45))}
.cicon.sm{width:30px;height:30px;flex:0 0 30px}
.cicon.lg{width:46px;height:46px;flex:0 0 46px}

/* ============ ФИЛЬТРЫ / ЧИПЫ ============ */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 8px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip-b{flex:0 0 auto;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;color:var(--text2);
  background:var(--panel);border:1px solid var(--line);transition:all .25s}
.chip-b.on{color:#1E1608;background:linear-gradient(180deg,var(--gold-hi),var(--gold));border-color:transparent;
  box-shadow:0 4px 12px -4px rgba(212,175,106,.5)}
.monthnav{display:flex;align-items:center;justify-content:center;gap:4px;margin:2px 0 12px}
.monthnav b{font-size:16px;font-weight:700;min-width:150px;text-align:center;text-transform:capitalize}
.mbtn{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;color:var(--gold);font-size:20px;
  background:var(--panel);border:1px solid var(--line);transition:transform .3s var(--spring)}
.mbtn:active{transform:scale(.88)}
.mbtn:disabled{opacity:.3}

/* ============ АНАЛИТИКА ============ */
.statcard{background:linear-gradient(180deg,var(--panel),#141519);border:1px solid var(--line);
  border-radius:var(--r-lg);padding:18px;margin-bottom:14px;box-shadow:0 10px 24px -14px rgba(0,0,0,.7)}
.statcard h3{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);font-weight:700;margin-bottom:12px}
.donutwrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:center}
.legend{flex:1;min-width:220px;display:grid;gap:8px}
.lrow{display:flex;align-items:center;gap:10px;font-size:13.5px}
.lrow .sw{width:11px;height:11px;border-radius:4px;flex:0 0 11px;box-shadow:inset 0 1px 1px rgba(255,255,255,.3)}
.lrow .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lrow .pc{color:var(--text3);font-size:12px}
.lrow .vl{font-weight:700;font-variant-numeric:tabular-nums}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{background:var(--panel2);border-radius:var(--r-sm);padding:12px 14px;border:1px solid var(--line)}
.kpi span{display:block;font-size:11.5px;color:var(--text3);font-weight:600}
.kpi b{display:block;font-size:17px;margin-top:3px;font-variant-numeric:tabular-nums}
.bars{display:flex;align-items:flex-end;gap:5px;height:120px;margin-top:6px}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
.barcol i{width:100%;max-width:26px;border-radius:5px 5px 2px 2px;min-height:2px;
  background:linear-gradient(180deg,var(--gold-hi),var(--gold-lo));
  box-shadow:inset 0 1px 1px rgba(255,255,255,.4),0 2px 6px -2px rgba(212,175,106,.4);
  transition:height .6s var(--spring-soft)}
.barcol i.dim{background:linear-gradient(180deg,#3A3B42,#2A2B30);box-shadow:none}
.barcol span{font-size:9.5px;color:var(--text3);font-weight:600}

/* ============ ЕЩЁ / НАСТРОЙКИ ============ */
.setlist{background:linear-gradient(180deg,var(--panel),#141519);border:1px solid var(--line);
  border-radius:var(--r-md);overflow:hidden;margin-bottom:16px}
.setrow{display:flex;align-items:center;gap:12px;width:100%;padding:13px 15px;text-align:left;
  border-bottom:1px solid var(--line);font-size:15px;font-weight:500}
.setrow:last-child{border-bottom:none}
.setrow .grow{flex:1}
.setrow .val{color:var(--text2);font-size:14px}
.setrow .chev{color:var(--text3)}
@media(hover:hover){.setrow:hover{background:rgba(255,255,255,.03)}}
.note{color:var(--text3);font-size:12.5px;line-height:1.5;margin:-8px 4px 18px}

/* ============ ШТОРКА (SHEET) ============ */
#overlay{position:fixed;inset:0;z-index:60;background:rgba(5,5,7,.6);
  -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity .3s}
#overlay.on{opacity:1;pointer-events:auto}
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;max-height:88%;overflow-y:auto;
  background:linear-gradient(180deg,#1B1C21,#131418);border-radius:24px 24px 0 0;
  border-top:1px solid var(--line2);box-shadow:0 -18px 50px rgba(0,0,0,.6);
  padding:10px 20px calc(env(safe-area-inset-bottom) + 22px);
  transform:translateY(105%);transition:transform .45s var(--spring)}
#sheet.on{transform:translateY(0)}
#sheet .grab{width:40px;height:5px;border-radius:3px;background:var(--text3);opacity:.5;margin:2px auto 14px}
#sheet h2{font-family:var(--display);font-size:22px;font-weight:600;margin-bottom:14px}
@media(min-width:700px){
  #sheet{left:50%;right:auto;bottom:auto;top:50%;width:460px;max-height:82%;border-radius:24px;
    transform:translate(-50%,-46%) scale(.96);opacity:0;transition:transform .4s var(--spring),opacity .3s;border:1px solid var(--line2)}
  #sheet.on{transform:translate(-50%,-50%) scale(1);opacity:1}
}
.seg{display:flex;background:var(--panel2);border-radius:14px;padding:4px;gap:4px;margin-bottom:16px}
.seg button{flex:1;padding:9px 4px;border-radius:11px;font-size:13.5px;font-weight:600;color:var(--text2);transition:all .25s}
.seg button.on{color:#1E1608;background:linear-gradient(180deg,var(--gold-hi),var(--gold));
  box-shadow:0 3px 8px -2px rgba(212,175,106,.5)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);font-weight:700;margin-bottom:7px}
.field input[type=text],.field input[type=date]{width:100%;padding:12px 14px;border-radius:var(--r-sm);font-size:16px;
  background:var(--panel2);border:1px solid var(--line2);color:var(--text);font-family:var(--sans)}
.field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,106,.18)}
.bigamount{width:100%;text-align:center;font-family:var(--display);font-size:44px;font-weight:600;
  background:transparent;border:none;color:var(--text);font-variant-numeric:tabular-nums;
  border-bottom:2px solid var(--line2);border-radius:0;padding:6px 0 10px;margin:4px 0 18px;caret-color:var(--gold)}
.bigamount:focus{border-color:var(--gold)}
.bigamount::placeholder{color:var(--text3);opacity:.55}
.catgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.catcell{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 2px 8px;border-radius:var(--r-sm);
  border:1px solid transparent;font-size:10.5px;color:var(--text2);font-weight:600;text-align:center;
  transition:all .25s}
.catcell span{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.catcell.on{background:var(--panel2);border-color:rgba(212,175,106,.5);color:var(--text)}
.cardpick{display:grid;gap:8px;margin-bottom:14px}
.cardpick button{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:var(--r-sm);
  background:var(--panel2);border:1px solid var(--line);font-size:14.5px;font-weight:600;text-align:left;transition:all .2s}
.cardpick button.on{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,106,.15)}
.cardpick .mini{width:44px;height:28px;border-radius:6px;flex:0 0 44px;box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 2px 5px rgba(0,0,0,.4)}
.mini.d-green{background:linear-gradient(128deg,#0F3D2E,#1C5A43)}
.mini.d-black{background:linear-gradient(128deg,#17181C,#2A2C31)}
.mini.d-plat{background:linear-gradient(128deg,#C9CDD3,#8E939C)}
.mini.d-red{background:linear-gradient(128deg,#8E1B23,#C62839)}
.cardpick .bal{margin-left:auto;color:var(--text2);font-size:12.5px;font-variant-numeric:tabular-nums;font-weight:500}
.btn{display:block;width:100%;padding:15px;border-radius:16px;font-size:16.5px;font-weight:700;text-align:center;
  color:#1E1608;background:linear-gradient(180deg,var(--gold-hi),var(--gold) 55%,var(--gold-lo));
  box-shadow:0 8px 20px -6px rgba(212,175,106,.45),inset 0 1px 0 rgba(255,255,255,.5);
  transition:transform .3s var(--spring),filter .2s;margin-top:6px}
.btn:active{transform:scale(.97)}
.btn:disabled{filter:grayscale(.7) brightness(.6)}
.btn.ghost{background:var(--panel2);color:var(--text);box-shadow:none;border:1px solid var(--line2)}
.btn.danger{background:linear-gradient(180deg,var(--red-hi),var(--red-lo));color:#fff;
  box-shadow:0 8px 20px -6px rgba(198,40,57,.4),inset 0 1px 0 rgba(255,255,255,.25)}
.sheetrow2{display:flex;gap:10px}
.sheetrow2 .btn{flex:1}
textarea.impbox{width:100%;height:110px;padding:12px;border-radius:var(--r-sm);background:var(--panel2);
  border:1px solid var(--line2);color:var(--text);font-size:13px;font-family:ui-monospace,monospace;resize:none}

/* ============ ТОСТ ============ */
#toast{position:fixed;left:50%;bottom:calc(var(--tabbar-h) + env(safe-area-inset-bottom) + 18px);z-index:70;
  transform:translate(-50%,20px);opacity:0;pointer-events:none;
  background:linear-gradient(180deg,#26272D,#1B1C21);border:1px solid var(--line2);color:var(--text);
  padding:11px 20px;border-radius:20px;font-size:14px;font-weight:600;white-space:nowrap;
  box-shadow:0 10px 30px rgba(0,0,0,.6);transition:all .4s var(--spring)}
#toast.on{transform:translate(-50%,0);opacity:1}

/* ============ ШИРОКИЕ ЭКРАНЫ (iPad / Mac) ============ */
@media(min-width:1000px){
  #page-cards .wrap{max-width:1060px;display:grid;grid-template-columns:440px 1fr;gap:36px;align-items:start}
  #page-cards .colL{position:sticky;top:10px}
  .tabbar{left:50%;right:auto;bottom:14px;transform:translateX(-50%);width:440px;border-radius:22px;
    border:1px solid var(--line);height:auto;padding:8px 10px;box-shadow:0 14px 40px rgba(0,0,0,.5)}
  .slot{flex-basis:400px}
}
/* ============ ЖИВЫЕ ПЕРЕХОДЫ ============ */
@keyframes pageIn{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
.page.on>.wrap{animation:pageIn .45s var(--spring-soft) both}
@keyframes rowIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.ain{animation:rowIn .5s var(--spring-soft) both}
@keyframes heroIn{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:none}}
#cardpanel.pin .hero,#cardpanel.pin .actions{animation:heroIn .45s var(--spring-soft) both}
#cardpanel.pin .actions{animation-delay:.06s}
.bankcard{transition:transform .45s var(--spring-soft);transform-style:preserve-3d;will-change:transform}
.donutseg{transition:stroke-dasharray .9s var(--spring-soft)}
.stage{will-change:transform}
/* ============ REDUCE MOTION ============ */
@media(prefers-reduced-motion:reduce){
  *{transition-duration:.01ms!important;animation-duration:.01ms!important;scroll-behavior:auto!important}
  .bc-inner{transition:none}
  .bankcard.flipped .bc-inner{transform:none}
  .bankcard.flipped .face.front{visibility:hidden}
  .bankcard:not(.flipped) .face.back{visibility:hidden}

}

<script>
'use strict';
/* ================= КОНСТАНТЫ ================= */

   Архитектура расширяема: у кредитных карт зарезервированы поля apr и

const CARDS = [

const CUR_NAMES = { RUB:'Российский рубль', USD:'Доллар США', EUR:'Евро', TRY:'Турецкая лира' };
const UNCAT_ID = 'uncat';

/* Глифы (24×24, контурный стиль) для объёмных иконок */
const GLYPHS = {
  cart:'<path d="M3.5 5h2l2 10.3a1.7 1.7 0 0 0 1.7 1.4h6.9a1.7 1.7 0 0 0 1.7-1.3l2-7.9H6.6"/><circle cx="10.2" cy="19.6" r="1.4"/><circle cx="16.4" cy="19.6" r="1.4"/>',

};

const PALETTE = ['#D4AF6A','#C62839','#1C5A43','#8E939C','#B87352','#4E6E8E','#7A5C9E','#5E8E62','#C4A24D','#94494F','#3E7C8A','#8E6D3A'];
const REDUCE = matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ================= СОСТОЯНИЕ ================= */
const state = { cur:'RUB', cats:[], tx:[] };
const ui = {
  tab:'cards', cardIdx:0,
  hMonth:new Date(), hCard:'all',
  sMonth:new Date(), sCard:'all'
};

/* ================= ПОСТОЯННОЕ ХРАНИЛИЩЕ (IndexedDB) =================
   Финансовые данные живут ТОЛЬКО здесь — отдельно от кэша интерфейса.
   Каждая операция записывается сразу, «корзины» в памяти — лишь зеркало. */
let idb = null;
function dbOpen(){
  return new Promise((res, rej) => {
    const rq = indexedDB.open('cards-wallet', 1);
    rq.onupgradeneeded = () => {
      const d = rq.result;
      if (!d.objectStoreNames.contains('tx'))   d.createObjectStore('tx',   { keyPath:'id' });
      if (!d.objectStoreNames.contains('cats')) d.createObjectStore('cats', { keyPath:'id' });
      if (!d.objectStoreNames.contains('kv'))   d.createObjectStore('kv');
    };
    rq.onsuccess = () => res(rq.result);
    rq.onerror = () => rej(rq.error);
  });
}
function dbPut(store, val, key){
  return new Promise((res, rej) => {
    const t = idb.transaction(store, 'readwrite');
    key === undefined ? t.objectStore(store).put(val) : t.objectStore(store).put(val, key);
    t.oncomplete = res; t.onerror = () => rej(t.error);
  });
}
function dbDel(store, key){
  return new Promise((res, rej) => {
    const t = idb.transaction(store, 'readwrite');
    t.objectStore(store).delete(key);
    t.oncomplete = res; t.onerror = () => rej(t.error);
  });
}
function dbAll(store){
  return new Promise((res, rej) => {
    const rq = idb.transaction(store).objectStore(store).getAll();
    rq.onsuccess = () => res(rq.result); rq.onerror = () => rej(rq.error);
  });
}
function dbGet(store, key){
  return new Promise((res, rej) => {
    const rq = idb.transaction(store).objectStore(store).get(key);
    rq.onsuccess = () => res(rq.result); rq.onerror = () => rej(rq.error);
  });
}

/* ================= УТИЛИТЫ ================= */
const $ = (s, r) => (r || document).querySelector(s);
const $$ = (s, r) => [...(r || document).querySelectorAll(s)];
const uid = () => (crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).slice(2));
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const sym = () => CUR[state.cur];

function fmt(minor, withSym = true){
  const n = Math.abs(minor) / 100;
  const s = new Intl.NumberFormat('ru-RU', {
    minimumFractionDigits: minor % 100 ? 2 : 0, maximumFractionDigits: 2
  }).format(n);
  return (minor < 0 ? '−' : '') + s + (withSym ? ' ' + sym() : '');
}
function heroFmt(minor){
  const neg = minor < 0; const n = Math.abs(minor);
  const int = new Intl.NumberFormat('ru-RU').format(Math.floor(n / 100));
  const fr = n % 100;
  return (neg ? '−' : '') + int + (fr ? `<span class="frac">,${String(fr).padStart(2,'0')}</span>` : '') +
    ` <span class="sym">${sym()}</span>`;
}
function parseAmount(str){
  const v = parseFloat(String(str).replace(/[\s ]/g, '').replace(',', '.'));
  if (!isFinite(v) || v <= 0) return null;
  return Math.round(v * 100);
}
const cardById = (id) => CARDS.find((c) => c.id === id);
const catById = (id) => state.cats.find((c) => c.id === id) || state.cats.find((c) => c.id === UNCAT_ID);
const mKey = (d) => d.getFullYear() * 12 + d.getMonth();
const sameMonth = (ts, d) => { const t = new Date(ts); return mKey(t) === mKey(d); };
const monthName = (d) => new Intl.DateTimeFormat('ru-RU', { month:'long', year:'numeric' }).format(d).replace(' г.', '');
function shiftMonth(d, k){ return new Date(d.getFullYear(), d.getMonth() + k, 1); }
function dayLabel(ts){
  const d = new Date(ts), now = new Date();
  const day = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
  if (day(d) === day(now)) return 'Сегодня';
  if (day(d) === day(now) - 86400000) return 'Вчера';
  const opt = { day:'numeric', month:'long' };
  if (d.getFullYear() !== now.getFullYear()) opt.year = 'numeric';
  return new Intl.DateTimeFormat('ru-RU', opt).format(d);
}

/* Объёмная иконка: сфера с бликом + контурный глиф */
function cicon(key, pal = 'red', cls = 'cicon'){
  const grad = pal === 'gold' ? '#gGold' : pal === 'grey' ? '#gGrey' : '#gRed';
  const ink = pal === 'gold' ? '#2A1F0A' : '#fff';
  const g = (GLYPHS[key] || GLYPHS.dots).replace(/#fff/g, ink);
  return `<svg class="${cls}" viewBox="0 0 40 40" aria-hidden="true">
    <circle cx="20" cy="20" r="18" fill="url(${grad})"/>
    <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(0,0,0,.35)" stroke-width="1"/>
    <ellipse cx="15" cy="10.5" rx="10.5" ry="6" fill="url(#gHi)"/>
    <g fill="none" stroke="${ink}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" transform="translate(8,8)">${g}</g>
  </svg>`;
}
function curIcon(code, cls = 'cicon'){
  return `<svg class="${cls}" viewBox="0 0 40 40" aria-hidden="true">
    <circle cx="20" cy="20" r="18" fill="url(#gGold)"/>
    <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(0,0,0,.35)" stroke-width="1"/>
    <ellipse cx="15" cy="10.5" rx="10.5" ry="6" fill="url(#gHi)"/>
    <text x="20" y="27" text-anchor="middle" font-size="18" font-weight="700" fill="#2A1F0A" font-family="-apple-system,sans-serif">${CUR[code]}</text>
  </svg>`;
}

/* ================= РАСЧЁТЫ ================= */
function balance(cardId){
  let b = 0;
  for (const t of state.tx){
    if (t.type === 'expense' && t.card === cardId) b -= t.amount;
    else if (t.type === 'topup' && t.card === cardId) b += t.amount;
    else if (t.type === 'transfer'){
      if (t.card === cardId) b -= t.amount;
      if (t.to === cardId) b += t.amount;
    }
  }
  return b;
}
const totalBalance = () => CARDS.reduce((s, c) => s + balance(c.id), 0);
const totalDebt = () => CARDS.filter((c) => c.type === 'credit')
  .reduce((s, c) => s + Math.min(balance(c.id), 0), 0);
function txOfCard(cardId){
  return state.tx.filter((t) => t.card === cardId || (t.type === 'transfer' && t.to === cardId));
}
function spentByCat(month, cardId){
  const map = new Map();
  for (const t of state.tx){
    if (t.type !== 'expense' || !sameMonth(t.ts, month)) continue;
    if (cardId !== 'all' && t.card !== cardId) continue;
    const c = catById(t.cat);
    map.set(c.id, (map.get(c.id) || 0) + t.amount);
  }
  return [...map.entries()].sort((a, b) => b[1] - a[1]);
}
function monthExpense(month, cardId){
  return state.tx.reduce((s, t) =>
    s + (t.type === 'expense' && sameMonth(t.ts, month) && (cardId === 'all' || t.card === cardId) ? t.amount : 0), 0);
}
function monthTopup(month, cardId){
  return state.tx.reduce((s, t) =>
    s + (t.type === 'topup' && sameMonth(t.ts, month) && (cardId === 'all' || t.card === cardId) ? t.amount : 0), 0);
}

async function addTx(t){ state.tx.push(t); await dbPut('tx', t); }
async function updTx(t){ const i = state.tx.findIndex((x) => x.id === t.id); if (i >= 0) state.tx[i] = t; await dbPut('tx', t); }
async function removeTx(id){ state.tx = state.tx.filter((x) => x.id !== id); await dbDel('tx', id); }
async function saveCat(c){ const i = state.cats.findIndex((x) => x.id === c.id); i >= 0 ? state.cats[i] = c : state.cats.push(c); await dbPut('cats', c); }
async function removeCat(id){
  const affected = state.tx.filter((t) => t.cat === id);
  for (const t of affected){ t.cat = UNCAT_ID; await dbPut('tx', t); }
  state.cats = state.cats.filter((c) => c.id !== id);
  await dbDel('cats', id);
}

  });

function update3d(){
  const el = $('#carousel');
  if (!el.clientWidth) return; /* вкладка скрыта — размеры нулевые, индекс не трогаем */
  const mid = el.scrollLeft + el.clientWidth / 2;
  let best = 0, bestDist = Infinity;
  $$('.slot', el).forEach((slot, i) => {
    const c3 = $('.card3d', slot);
    const d = (slot.offsetLeft + slot.offsetWidth / 2 - mid) / slot.offsetWidth;
    if (Math.abs(d) < bestDist){ bestDist = Math.abs(d); best = i; }
    if (REDUCE){ c3.style.transform = 'none'; return; }
    const ry = Math.max(-1, Math.min(1, d)) * -16;
    const sc = 1 - Math.min(Math.abs(d) * .13, .22);
    const tz = -Math.min(Math.abs(d) * 70, 110);
    c3.style.transform = `translateZ(${tz}px) rotateX(${(1 - Math.min(Math.abs(d), 1)) * pageTilt}deg) rotateY(${ry}deg) scale(${sc})`;
    c3.style.filter = Math.abs(d) > .5 ? 'brightness(.75)' : 'none';
  });
  if (best !== ui.cardIdx){
    ui.cardIdx = best;
    $$('#dots i').forEach((d, i) => d.classList.toggle('on', i === best));
    renderPanel();
  }
}
function snapTo(idx){
  const el = $('#carousel');

}

function opRow(t, ctxCard){
  let icon, title, sub, amtCls, amtStr;
  const cardName = (id) => cardById(id) ? cardById(id).name : '?';
  if (t.type === 'expense'){
    const c = catById(t.cat);
    icon = cicon(c.icon, 'red');
    title = t.note || c.name;
    sub = `${cardName(t.card)} · ${c.name}`;
    amtCls = 'minus'; amtStr = '−' + fmt(t.amount);
  } else if (t.type === 'topup'){
    icon = cicon('plus', 'gold');
    title = t.note || 'Пополнение';
    sub = cardName(t.card);
    amtCls = 'plus'; amtStr = '+' + fmt(t.amount);
  } else {
    icon = cicon('swap', 'grey');
    if (ctxCard && t.card === ctxCard){ title = 'Перевод на ' + cardName(t.to); amtCls = 'minus'; amtStr = '−' + fmt(t.amount); }
    else if (ctxCard && t.to === ctxCard){ title = 'Перевод с ' + cardName(t.card); amtCls = 'plus'; amtStr = '+' + fmt(t.amount); }
    else { title = `Перевод: ${cardName(t.card)} → ${cardName(t.to)}`; amtCls = 'move'; amtStr = fmt(t.amount); }
    sub = t.note || 'Между картами';
  }
  const delay = Math.min((opRow._i || 0) * 35, 380);
  opRow._i = (opRow._i || 0) + 1;
  return `<button class="op ain" style="animation-delay:${delay}ms" data-tx="${t.id}">
    ${icon}
    <span class="t"><b>${esc(title)}</b><span>${esc(sub)}</span></span>
    <span class="a amt ${amtCls}">${amtStr}</span>
  </button>`;
}
function groupedList(ops, ctxCard){
  opRow._i = 0;
  const groups = new Map();
  for (const t of ops){
    const k = dayLabel(t.ts);
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(t);
  }
  let html = '';
  for (const [label, list] of groups){
    html += `<div class="daygroup"><div class="daylabel">${label}</div>
      <div class="oplist">${list.map((t) => opRow(t, ctxCard)).join('')}</div></div>`;
  }
  return html;
}

  $$('.chip-b', box).forEach((b) => b.addEventListener('click', () => { ui.hCard = b.dataset.id; renderHistory(); }));
  const scope = ui.hCard;
  const list = state.tx
    .filter((t) => sameMonth(t.ts, ui.hMonth))
    .filter((t) => scope === 'all' || t.card === scope || (t.type === 'transfer' && t.to === scope))
    .sort((a, z) => z.ts - a.ts);
  $('#h-summary').innerHTML = `<div class="kpis" style="margin-bottom:6px">
    <div class="kpi"><span>Расходы за месяц</span><b class="amt">−${fmt(monthExpense(ui.hMonth, scope))}</b></div>
    <div class="kpi"><span>Пополнения</span><b class="amt" style="color:var(--ok)">+${fmt(monthTopup(ui.hMonth, scope))}</b></div></div>`;
  $('#h-list').innerHTML = list.length
    ? groupedList(list, scope === 'all' ? null : scope)
    : '<div class="oplist"><div class="empty">В этом месяце операций нет</div></div>';
  bindOpRows($('#h-list'));
}

/* ================= АНАЛИТИКА ================= */
function donutSVG(entries, total){
  const R = 55, C = 2 * Math.PI * R;
  let off = 0;
  const segs = entries.map(([, v], i) => {
    const len = v / total * C;
    const s = `<circle class="donutseg" cx="75" cy="75" r="${R}" fill="none"
      stroke="${PALETTE[i % PALETTE.length]}" stroke-width="26"
      stroke-dasharray="0 ${C}" data-len="${len.toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}"/>`;
    off += len;
    return s;
  }).join('');
  return `<svg width="150" height="150" viewBox="0 0 150 150" style="transform:rotate(-90deg);flex:0 0 150px" aria-hidden="true">
    ${segs}<circle cx="75" cy="75" r="41" fill="#15161A"/></svg>`;
}
function renderStats(){
  $('#s-month').textContent = monthName(ui.sMonth);
  $('#s-next').disabled = mKey(ui.sMonth) >= mKey(new Date());
  const box = $('#s-cards');
  box.innerHTML = chipsHTML(ui.sCard);
  $$('.chip-b', box).forEach((b) => b.addEventListener('click', () => { ui.sCard = b.dataset.id; renderStats(); }));
  const scope = ui.sCard, month = ui.sMonth;
  const total = monthExpense(month, scope);
  const prev = monthExpense(shiftMonth(month, -1), scope);
  const byCat = spentByCat(month, scope);
  const top = byCat.slice(0, 7);
  const rest = byCat.slice(7).reduce((s, [, v]) => s + v, 0);
  if (rest) top.push(['__rest', rest]);

  /* сводка по системе карт / по карте */
  let head;
  if (scope === 'all'){
    const avail = CARDS.reduce((s, c) => s + (c.type === 'credit' ? c.limit + balance(c.id) : Math.max(balance(c.id), 0)), 0);
    head = `<div class="statcard"><h3>Все 4 карты — единая система</h3><div class="kpis">
      <div class="kpi"><span>Общий баланс</span><b class="amt">${fmt(totalBalance())}</b></div>
      <div class="kpi"><span>Долг по кредиткам</span><b class="amt">${fmt(-totalDebt())}</b></div>
      <div class="kpi"><span>Доступно всего</span><b class="amt">${fmt(avail)}</b></div>
      <div class="kpi"><span>Всего операций</span><b>${state.tx.length}</b></div></div></div>`;
  } else {
    const c = cardById(scope), b = balance(scope);
    head = `<div class="statcard"><h3>${esc(c.name)}</h3><div class="kpis">
      <div class="kpi"><span>Баланс</span><b class="amt">${fmt(b)}</b></div>
      ${c.type === 'credit'
        ? `<div class="kpi"><span>Задолженность</span><b class="amt">${fmt(Math.max(-b, 0))}</b></div>
           <div class="kpi"><span>Кредитный лимит</span><b class="amt">${fmt(c.limit)}</b></div>
           <div class="kpi"><span>Доступно</span><b class="amt">${fmt(c.limit + b)}</b></div>`
        : `<div class="kpi"><span>Операций по карте</span><b>${txOfCard(scope).length}</b></div>`}
    </div></div>`;
  }

  /* донат по категориям */
  const legend = top.map(([cid, v], i) => {
    const name = cid === '__rest' ? 'Остальное' : catById(cid).name;
    return `<div class="lrow"><span class="sw" style="background:${PALETTE[i % PALETTE.length]}"></span>
      <span class="nm">${esc(name)}</span><span class="pc amt">${Math.round(v / total * 100)}%</span>
      <span class="vl amt">${fmt(v)}</span></div>`;
  }).join('');
  const donutCard = `<div class="statcard"><h3>Расходы по категориям</h3>
    <div class="hero-amount amt" style="font-size:32px;margin:0 0 14px">${total ? heroFmt(total) : '<span style="color:var(--text3);font-size:16px;font-family:var(--sans)">Расходов в этом месяце нет</span>'}</div>
    ${total ? `<div class="donutwrap">${donutSVG(top, total)}<div class="legend">${legend}</div></div>` : ''}</div>`;

  /* показатели месяца */
  const biggest = state.tx.filter((t) => t.type === 'expense' && sameMonth(t.ts, month) && (scope === 'all' || t.card === scope))
    .sort((a, z) => z.amount - a.amount)[0];
  const now = new Date();
  const daysInScope = mKey(month) === mKey(now) ? now.getDate() : new Date(month.getFullYear(), month.getMonth() + 1, 0).getDate();
  const delta = prev ? Math.round((total - prev) / prev * 100) : null;
  const kpiCard = `<div class="statcard"><h3>Показатели</h3><div class="kpis">
    <div class="kpi"><span>Крупнейшая трата</span><b class="amt">${biggest ? fmt(biggest.amount) : '—'}</b>
      ${biggest ? `<span style="margin-top:2px">${esc(catById(biggest.cat).name)}</span>` : ''}</div>
    <div class="kpi"><span>В среднем в день</span><b class="amt">${fmt(Math.round(total / daysInScope))}</b></div>
    <div class="kpi"><span>Прошлый месяц</span><b class="amt">${fmt(prev)}</b></div>
    <div class="kpi"><span>К прошлому месяцу</span><b style="color:${delta === null ? 'var(--text2)' : delta > 0 ? 'var(--red-hi)' : 'var(--ok)'}">${delta === null ? '—' : (delta > 0 ? '+' : '') + delta + '%'}</b></div>
  </div></div>`;

  /* динамика 12 месяцев */
  const months = [];
  for (let k = 11; k >= 0; k--) months.push(shiftMonth(month, -k));
  const vals = months.map((d) => monthExpense(d, scope));
  const mx = Math.max(...vals, 1);
  const bars = months.map((d, i) => {
    const lbl = new Intl.DateTimeFormat('ru-RU', { month:'short' }).format(d).replace('.', '').slice(0, 3);
    const cur = i === 11;
    return `<div class="barcol"><i class="${vals[i] ? '' : 'dim'}" data-h="${Math.max(vals[i] / mx * 100, 2).toFixed(1)}" style="height:2px;${cur ? '' : 'opacity:.55'}"></i>
      <span style="${cur ? 'color:var(--gold)' : ''}">${lbl}</span></div>`;
  }).join('');
  const barCard = `<div class="statcard"><h3>Динамика расходов, 12 мес</h3><div class="bars">${bars}</div></div>`;

  $('#s-body').innerHTML = head + donutCard + kpiCard + barCard;
  requestAnimationFrame(() => {
    const C = 2 * Math.PI * 55;
    $$('#s-body .donutseg').forEach((s) => {
      const len = parseFloat(s.dataset.len);
      s.setAttribute('stroke-dasharray', `${len} ${C - len}`);
    });
    $$('#s-body .barcol i').forEach((b) => b.style.height = b.dataset.h + '%');
  });
}

    <div class="section-t">О приложении</div>

      <div class="setrow"><span class="grow" style="padding-left:42px">Операций</span><span class="val amt">${opsCnt}</span></div>

  $('#m-cats').addEventListener('click', openCatManager);
  $('#m-cur').addEventListener('click', openCurrencySheet);

/* --- категории --- */
function openCatManager(){
  const rows = state.cats.filter((c) => c.id !== UNCAT_ID).map((c) => {
    const cnt = state.tx.filter((t) => t.cat === c.id).length;
    return `<button class="setrow" data-cat="${c.id}">${cicon(c.icon, 'red', 'cicon sm')}
      <span class="grow">${esc(c.name)}</span><span class="val amt">${cnt || ''}</span><span class="chev">›</span></button>`;
  }).join('');
  sheetOpen(`
    <h2>Категории</h2>
    <button class="btn ghost" id="cat-new" style="margin-bottom:14px">Новая категория</button>
    <div class="setlist">${rows}</div>
    <p class="note" style="margin-top:12px">При удалении категории её операции автоматически перейдут в «Без категории» — ни одна запись не потеряется.</p>`);
  $('#cat-new').addEventListener('click', () => openCatEdit(null));
  $$('#sheet [data-cat]').forEach((b) => b.addEventListener('click', () => openCatEdit(b.dataset.cat)));
}
function openCatEdit(id){
  const cat = id ? state.cats.find((c) => c.id === id) : null;
  let icon = cat ? cat.icon : 'cart';
  const cnt = cat ? state.tx.filter((t) => t.cat === cat.id).length : 0;
  sheetOpen(`
    <h2>${cat ? 'Категория' : 'Новая категория'}</h2>
    <div class="field"><label>Название</label>
      <input type="text" id="cat-name" maxlength="28" value="${cat ? esc(cat.name) : ''}" placeholder="Например: Спорт"></div>
    <div class="field"><label>Значок</label>
      <div class="catgrid" id="cat-icons">${PICKER_ICONS.map((k) =>
        `<button type="button" class="catcell ${k === icon ? 'on' : ''}" data-ic="${k}">${cicon(k, 'red', 'cicon sm')}</button>`).join('')}</div></div>
    <button class="btn" id="cat-save">Сохранить</button>
    ${cat ? `<button class="btn danger" id="cat-del" style="margin-top:10px">Удалить${cnt ? ` (операций: ${cnt})` : ''}</button>` : ''}`);
  $$('#cat-icons .catcell').forEach((b) => b.addEventListener('click', () => {
    $$('#cat-icons .catcell').forEach((x) => x.classList.remove('on'));
    b.classList.add('on'); icon = b.dataset.ic;
  }));
  $('#cat-save').addEventListener('click', async () => {
    const name = $('#cat-name').value.trim();
    if (!name) return toast('Введите название');
    await saveCat({ id: cat ? cat.id : 'u-' + uid(), name, icon });
    render(); openCatManager(); toast('Сохранено');
  });
  if (cat) {
    let armed = false;
    $('#cat-del').addEventListener('click', async (e) => {
      if (!armed){
        armed = true;
        e.target.textContent = cnt ? `Точно удалить? ${cnt} опер. → «Без категории»` : 'Точно удалить?';
        return;
      }
      await removeCat(cat.id);
      render(); openCatManager(); toast('Категория удалена');
    });
  }
}

/* --- валюта --- */

  sheetOpen(`<h2>Валюта</h2><div class="setlist">${Object.keys(CUR).map((k) =>
    `<button class="setrow" data-cur="${k}">${curIcon(k, 'cicon sm')}<span class="grow">${CUR_NAMES[k]}</span>
     <span class="val">${k === state.cur ? '✓' : ''}</span></button>`).join('')}</div>
    <p class="note" style="margin-top:12px">Символ отображения сумм. Суммы не пересчитываются по курсу.</p>`);
  $$('#sheet [data-cur]').forEach((b) => b.addEventListener('click', async () => {
    await saveCur(b.dataset.cur);
    sheetClose(); render(); toast('Валюта: ' + CUR[state.cur]);

/* --- экспорт / импорт --- */
const exportJSON = () => JSON.stringify({
  app:'cards-wallet', ver:1, exportedAt:new Date().toISOString(),
  cur:state.cur, cats:state.cats, tx:state.tx
}, null, 1);
function openExportSheet(){
  sheetOpen(`
    <h2>Экспорт</h2>
    <p class="note" style="margin:0 0 14px">Операций: ${state.tx.length}. Сохраните файл в iCloud Drive — это и резервная копия, и способ перенести историю на iPad или Mac.</p>
    <button class="btn" id="exp-file">Скачать файлом</button>
    <button class="btn ghost" id="exp-copy" style="margin-top:10px">Скопировать текст</button>`);
  $('#exp-file').addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([exportJSON()], { type:'application/json' }));
    a.download = `мои-карты-копия-${todayISO()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
    toast('Файл сформирован');
  });
  $('#exp-copy').addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(exportJSON()); toast('Скопировано в буфер'); }
    catch { toast('Не удалось скопировать'); }
  });
}
async function mergeImport(text){
  let d;
  try { d = JSON.parse(text); } catch { return toast('Файл не распознан'); }
  if (!d || d.app !== 'cards-wallet' || !Array.isArray(d.tx)) return toast('Это не копия «Мои карты»');
  const have = new Set(state.tx.map((t) => t.id));
  let at = 0, ac = 0;
  for (const c of (d.cats || [])){
    if (c && c.id && c.id !== UNCAT_ID && !state.cats.find((x) => x.id === c.id)){
      await saveCat({ id:String(c.id), name:String(c.name || 'Категория').slice(0, 28), icon:GLYPHS[c.icon] ? c.icon : 'dots' });
      ac++;
    }
  }
  for (const t of d.tx){
    if (!t || !t.id || have.has(t.id) || !cardById(t.card)) continue;
    const type = ['expense', 'topup', 'transfer'].includes(t.type) ? t.type : null;
    const amount = Math.round(+t.amount);
    if (!type || !isFinite(amount) || amount <= 0) continue;
    const tt = { id:String(t.id), ts:+t.ts || Date.now(), type, card:t.card, amount, note:String(t.note || '').slice(0, 60) };
    if (type === 'expense') tt.cat = state.cats.find((x) => x.id === t.cat) ? t.cat : UNCAT_ID;
    if (type === 'transfer'){
      if (!cardById(t.to) || t.to === t.card) continue;
      tt.to = t.to;
    }
    await addTx(tt); at++;
  }
  sheetClose(); render();
  toast(at || ac ? `Добавлено: операций ${at}, категорий ${ac}` : 'Новых записей нет');
}
function openImportSheet(){
  sheetOpen(`
    <h2>Импорт</h2>
    <p class="note" style="margin:0 0 14px">Выберите файл копии из «Файлов» (iCloud Drive) или вставьте скопированный текст. Существующие записи не задваиваются.</p>
    <div class="field"><label>Файл</label><input type="file" id="imp-file" accept=".json,application/json"></div>
    <div class="field"><label>Или текст</label><textarea class="impbox" id="imp-text" placeholder='{"app":"cards-wallet", …}'></textarea></div>
    <button class="btn" id="imp-go">Импортировать</button>`);
  $('#imp-go').addEventListener('click', () => {
    const f = $('#imp-file').files[0];
    const txt = $('#imp-text').value.trim();
    if (f){
      const r = new FileReader();
      r.onload = () => mergeImport(r.result);
      r.readAsText(f);
    } else if (txt) mergeImport(txt);
    else toast('Выберите файл или вставьте текст');
  });
}
function openWipeSheet(){
  sheetOpen(`
    <h2>Стереть все операции</h2>
    <p class="note" style="margin:0 0 14px">Будут удалены все ${state.tx.length} операций на всех картах. Категории и настройки останутся. Действие необратимо — сделайте экспорт заранее.</p>
    <button class="btn danger" id="wipe-go">Стереть операции</button>
    <button class="btn ghost" id="wipe-no" style="margin-top:10px">Отмена</button>`);
  $('#wipe-no').addEventListener('click', sheetClose);
  let armed = false;
  $('#wipe-go').addEventListener('click', async (e) => {
    if (!armed){ armed = true; e.target.textContent = 'Точно стереть всё?'; return; }
    await new Promise((res, rej) => {
      const t = idb.transaction('tx', 'readwrite');
      t.objectStore('tx').clear();
      t.oncomplete = res; t.onerror = () => rej(t.error);
    });
    state.tx = [];
    sheetClose(); render(); toast('Операции стёрты');
  });
}

/* ================= ЗАПУСК ================= */
$('#h-prev').addEventListener('click', () => { ui.hMonth = shiftMonth(ui.hMonth, -1); renderHistory(); });
$('#h-next').addEventListener('click', () => { ui.hMonth = shiftMonth(ui.hMonth, 1); renderHistory(); });
$('#s-prev').addEventListener('click', () => { ui.sMonth = shiftMonth(ui.sMonth, -1); renderStats(); });
$('#s-next').addEventListener('click', () => { ui.sMonth = shiftMonth(ui.sMonth, 1); renderStats(); });

$('#carousel').addEventListener('scroll', () => requestAnimationFrame(update3d), { passive:true });
addEventListener('resize', () => requestAnimationFrame(update3d));
$('#page-cards').addEventListener('scroll', () => {
  if (REDUCE) return;
  const y = $('#page-cards').scrollTop;
  pageTilt = Math.max(-8, Math.min(8, y / 26));
  $('.stage').style.transform = `translateY(${Math.min(y * .22, 60)}px)`;
  requestAnimationFrame(update3d);
}, { passive:true });

(async function boot(){
  try {
    idb = await dbOpen();
    const [tx, cats, cur] = await Promise.all([dbAll('tx'), dbAll('cats'), dbGet('kv', 'cur')]);
    state.tx = tx || [];
    if (cur) state.cur = cur;
    if (cats && cats.length){
      state.cats = cats;
      if (!state.cats.find((c) => c.id === UNCAT_ID)){
        const u = PRESET_CATS.find((c) => c.id === UNCAT_ID);
        state.cats.push(u); await dbPut('cats', u);
      }
    } else {
      state.cats = PRESET_CATS.map((c) => ({ ...c }));
      for (const c of state.cats) await dbPut('cats', c);
    }
  } catch (e) {
    state.cats = PRESET_CATS.map((c) => ({ ...c }));
    toast('Хранилище недоступно — данные не сохранятся');
  }
  try {
    if (navigator.storage && navigator.storage.persist)
      navigator.storage.persist().then((v) => { persistedStorage = v; });
  } catch {}
  render();
  if ('serviceWorker' in navigator && location.protocol.startsWith('http'))
    navigator.serviceWorker.register('./sw.js').catch(() => {});
})();
</script>
